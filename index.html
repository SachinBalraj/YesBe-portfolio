          "acceptedAnswer": {
            "@type": "Answer",

          "@type": "Question",
          "name": "What services does YesBe provide?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Services include AI & Intelligent Solutions, Full Stack Website Development, ERP Solutions, Power BI & Data Analytics Dashboards, Cloud Deployment & DevOps, SEO/GEO/AEO Optimization, Database Management, Business Automation, Digital Marketing, and Business Technology Consulting."
          }
        },
        {
          "@type": "Question",
          "name": "What industries do you work with?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We work across education, healthcare, retail, restaurants, manufacturing, finance, construction, logistics, real estate, startups, SMEs, and large enterprises. Each industry gets a tailored solution built for its specific workflows."
          }
        },
        {
          "@type": "Question",
          "name": "Can you build ERP software?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Custom ERP solutions include School Management ERP, Hospital ERP, Inventory Management, Billing Systems, and enterprise resource planning tools. Each ERP is built specifically for the client's business processes."
          }
        },
        {
          "@type": "Question",
          "name": "How much does a business website cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Website development starts from ₹4,999 for landing pages up to ₹2,50,000+ for custom web applications. Pricing depends on features, integrations, timeline, and complexity. A detailed proposal with transparent milestones is shared after understanding the project."
          }
        },
        {
          "@type": "Question",
          "name": "What is RAG implementation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "RAG (Retrieval-Augmented Generation) connects AI language models to your business data so the AI provides accurate, context-aware answers. It's used for customer support bots, internal knowledge assistants, and document analysis tools."
          }
        },
        {
          "@type": "Question",
          "name": "Can you develop AI chatbots?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AI chatbots are built using OpenAI, LangChain, and custom RAG pipelines. They handle customer support, lead qualification, internal queries, and product recommendations — trained on your specific business data."
          }
        },
        {
          "@type": "Question",
          "name": "Do you provide Power BI dashboards?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Power BI dashboards consolidate data from multiple sources into real-time, interactive reports. Services include executive dashboards, KPI tracking, automated report generation, anomaly detection, and predictive analytics."
          }
        },
        {
          "@type": "Question",
          "name": "Do you build custom software?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Custom software includes admin panels, internal tools, SaaS applications, business portals, and industry-specific solutions built with React, Node.js, and Python for performance and scalability."
          }
        },
        {
          "@type": "Question",
          "name": "Can you automate business workflows?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Business automation covers workflow automation, API integration, CRM setup, automated notifications, data synchronization, and AI-powered process optimization to eliminate repetitive manual tasks."
          }
        },
        {
          "@type": "Question",
          "name": "Do you provide cloud deployment?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Cloud services include AWS and Azure deployment, Docker containerization, CI/CD pipeline setup, server configuration, SSL setup, and performance optimization with security and monitoring."
          }
        },
        {
          "@type": "Question",
          "name": "Do you optimize websites for SEO?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. SEO services include technical SEO audits, on-page optimization, keyword research, content strategy, Google Business Profile optimization, and performance improvements — combined with GEO and AEO."
          }
        },
        {
          "@type": "Question",
          "name": "What is GEO optimization?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GEO (Generative Engine Optimization) optimizes your website so AI search engines like ChatGPT, Gemini, and Perplexity recommend your business when users ask relevant questions."
          }
        },
        {
          "@type": "Question",
          "name": "What is AEO optimization?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AEO (Answer Engine Optimization) structures content to provide direct, concise answers for Google Featured Snippets, voice assistants, and AI summaries using question-based headings and FAQ schemas."
          }
        },
        {
          "@type": "Question",
          "name": "Can you integrate AI into existing software?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AI can be added to existing applications — chatbots, recommendation engines, AI-powered search, automated data processing — via APIs without rewriting the entire system."
          }
        },
        {
          "@type": "Question",
          "name": "Do you work with startups?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Startup services include MVP development, rapid prototyping, scalable architecture, and go-to-market technology strategy — focused on building lean, validated products quickly."
          }
        },
        {
          "@type": "Question",
          "name": "Do you work with enterprises?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Enterprise services include large-scale ERP, custom software, cloud infrastructure, AI integration, business intelligence dashboards, and ongoing technical consulting with proper documentation."
          }
        },
        {
          "@type": "Question",
          "name": "What technologies do you use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Frontend: React, TypeScript, Tailwind CSS. Backend: Node.js, Python, FastAPI. Database: MongoDB, PostgreSQL. Cloud: AWS, Docker. AI: OpenAI, LangChain. Analytics: Power BI. Marketing: SEO, GEO, AEO."
          }
        },
        {
          "@type": "Question",
          "name": "How can I contact YesBe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Contact us via email at sachinbalraj01@gmail.com, phone at +91 9087795970, WhatsApp, LinkedIn, or the enquiry form. A detailed proposal is typically shared within 24 hours."
          }
        },
        {
          "@type": "Question",
          "name": "How long does development take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Timeline depends on scope. Landing page: 3–5 days. Business website: 1–3 weeks. Custom web app: 2–8 weeks. ERP: 4–12 weeks. AI solutions: 2–6 weeks. A detailed timeline is provided after the discovery phase."
          }
        }
      ]
    }
